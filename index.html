<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athena Biju — Investment Research & Institutional Strategy</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f4efe6}
    iframe{display:block;width:100%;height:100%;border:0;background:#f4efe6}
    #loading{position:fixed;inset:0;display:grid;place-items:center;color:#632d37;background:#f4efe6;font:500 18px Georgia,serif;letter-spacing:.04em;z-index:2}
  </style>
</head>
<body>
  <div id="loading">Loading portfolio…</div>
  <iframe id="portfolio" src="site.html" title="Athena Biju portfolio"></iframe>
  <script src="portrait-1.js"></script>
  <script src="portrait-2.js"></script>
  <script>
    const frame=document.getElementById('portfolio');
    frame.addEventListener('load',()=>{
      try{
        const doc=frame.contentDocument;
        const portrait=doc.querySelector('.portrait-frame img');
        if(portrait){
          portrait.src='data:image/webp;base64,'+window.__athenaPortrait;
          portrait.removeAttribute('srcset');
        }
        const og=doc.querySelector('meta[property="og:image"]');
        if(og) og.content='data:image/webp;base64,'+window.__athenaPortrait;
      }catch(error){console.error(error)}
      document.getElementById('loading').remove();
    });
  </script>
</body>
</html>
